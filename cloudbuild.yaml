options:
  logging: CLOUD_LOGGING_ONLY

steps:
# Install dependencies
- name: node:18
  entrypoint: npm
  args: ["install"]

# Build Vite project
- name: node:20
  entrypoint: npm
  args: ["run", "build"]

# Build Docker image
- name: gcr.io/cloud-builders/docker
  args: [
    "build",
    "-t",
    "gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA",
    "."
  ]

# Push Docker image
- name: gcr.io/cloud-builders/docker
  args: [
    "push",
    "gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA"
  ]

images:
- gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA