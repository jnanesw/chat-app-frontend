options:
  logging: CLOUD_LOGGING_ONLY

steps:
# Clean install
- name: node:22
  entrypoint: bash
  args:
    - -c
    - |
      rm -rf node_modules package-lock.json
      npm install

# Build project
- name: node:22
  entrypoint: npm
  args: ["run", "build"]

# Build Docker image
- name: gcr.io/cloud-builders/docker
  args:
    [
      "build",
      "-t",
      "gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA",
      "."
    ]

# Push Docker image
- name: gcr.io/cloud-builders/docker
  args:
    [
      "push",
      "gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA"
    ]

images:
- gcr.io/$PROJECT_ID/chat-app-frontend:$COMMIT_SHA